; NESP production overrides for OpenCATS.
; HTTPS is expected to terminate at Cloudflare Tunnel or a trusted reverse proxy.

expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL
default_charset = "UTF-8"

memory_limit = 256M
max_execution_time = 120
max_input_time = 120

file_uploads = On
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 20

session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Turn this on after HTTPS is confirmed end-to-end.
; session.cookie_secure = 1
