previews:
  generation: off

services:
  - type: pserv
    name: nesp-hiring-db
    runtime: image
    plan: starter
    region: virginia
    image:
      url: docker.io/library/mariadb:10.11
    envVars:
      - key: PORT
        value: 3306
      - key: MARIADB_DATABASE
        value: cats
      - key: MARIADB_USER
        value: opencats
      - key: MARIADB_PASSWORD
        generateValue: true
      - key: MARIADB_ROOT_PASSWORD
        generateValue: true
      - key: MARIADB_AUTO_UPGRADE
        value: 1
    disk:
      name: nesp-hiring-db-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - type: web
    name: nesp-hiring-web
    runtime: docker
    plan: starter
    region: virginia
    branch: master
    autoDeployTrigger: checksPass
    dockerfilePath: ./docker/render/Dockerfile
    dockerContext: .
    healthCheckPath: /render-health.txt
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_TIMEZONE
        value: America/New_York
      - key: DB_NAME
        value: cats
      - key: DB_USER
        fromService:
          name: nesp-hiring-db
          type: pserv
          envVarKey: MARIADB_USER
      - key: DB_PASSWORD
        fromService:
          name: nesp-hiring-db
          type: pserv
          envVarKey: MARIADB_PASSWORD
      - key: DB_HOST
        fromService:
          name: nesp-hiring-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: nesp-hiring-db
          type: pserv
          property: port
      - key: INSTALL_ACCESS_USER
        value: nesp-admin
      - key: INSTALL_ACCESS_PASSWORD
        sync: false
      - key: OPENCATS_MAIL_ENABLED
        # Disabled unless an administrator explicitly sets this protected
        # Render value. A static Blueprint value would overwrite that choice
        # on every deploy.
        sync: false
      # Mail is deliberately disabled by default. If Craig separately enables
      # it in Render, every value below must be set as a Render secret.
      - key: OPENCATS_MAIL_MAILER
        sync: false
      - key: OPENCATS_MAIL_SMTP_HOST
        sync: false
      - key: OPENCATS_MAIL_SMTP_PORT
        sync: false
      - key: OPENCATS_MAIL_SMTP_AUTH
        sync: false
      - key: OPENCATS_MAIL_SMTP_USER
        sync: false
      - key: OPENCATS_MAIL_SMTP_PASS
        sync: false
      - key: OPENCATS_MAIL_SMTP_SECURE
        sync: false
      - key: OPENCATS_MAIL_FROM_ADDRESS
        sync: false
      - key: NESP_BOARD_INTAKE_MISSIVE_API_TOKEN
        sync: false
      - key: NESP_BOARD_INTAKE_MISSIVE_WEBHOOK_SECRET
        sync: false
      - key: NESP_BOARD_INTAKE_MISSIVE_RULE_ID
        sync: false
      - key: NESP_BOARD_INTAKE_MISSIVE_SHARED_LABEL_ID
        sync: false
      - key: NESP_BOARD_INTAKE_SYSTEM_USER_ID
        sync: false
    disk:
      name: nesp-hiring-files
      mountPath: /var/data
      sizeGB: 10

  # Render schedules in UTC. These four candidate hours cover 08:00 and 18:00
  # America/New_York in both standard and daylight time; the CLI applies the
  # matching local-hour gate before processing.
  - type: cron
    name: nesp-board-intake-scheduler
    runtime: docker
    plan: starter
    region: virginia
    branch: master
    autoDeployTrigger: checksPass
    schedule: "0 12,13,22,23 * * *"
    dockerfilePath: ./docker/render/Dockerfile
    dockerContext: .
    dockerCommand: php scripts/nesp_board_intake_scheduler.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_TIMEZONE
        value: America/New_York
      - key: APP_BASIC_AUTH
        value: 0
      - key: NESP_SERVICE_ROLE
        value: cron
      - key: DB_NAME
        value: cats
      - key: DB_USER
        fromService:
          name: nesp-hiring-db
          type: pserv
          envVarKey: MARIADB_USER
      - key: DB_PASSWORD
        fromService:
          name: nesp-hiring-db
          type: pserv
          envVarKey: MARIADB_PASSWORD
      - key: DB_HOST
        fromService:
          name: nesp-hiring-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: nesp-hiring-db
          type: pserv
          property: port
      - key: NESP_BOARD_INTAKE_MISSIVE_API_TOKEN
        sync: false
      - key: NESP_BOARD_INTAKE_MISSIVE_WEBHOOK_SECRET
        sync: false
      - key: NESP_BOARD_INTAKE_MISSIVE_RULE_ID
        sync: false
      - key: NESP_BOARD_INTAKE_MISSIVE_SHARED_LABEL_ID
        sync: false
      - key: NESP_BOARD_INTAKE_SYSTEM_USER_ID
        sync: false
      - key: OPENCATS_MAIL_ENABLED
        sync: false
      - key: OPENCATS_MAIL_MAILER
        sync: false
      - key: OPENCATS_MAIL_SMTP_HOST
        sync: false
      - key: OPENCATS_MAIL_SMTP_PORT
        sync: false
      - key: OPENCATS_MAIL_SMTP_AUTH
        sync: false
      - key: OPENCATS_MAIL_SMTP_USER
        sync: false
      - key: OPENCATS_MAIL_SMTP_PASS
        sync: false
      - key: OPENCATS_MAIL_SMTP_SECURE
        sync: false
      - key: OPENCATS_MAIL_FROM_ADDRESS
        sync: false

  # Candidate UTC hours cover 09:00 America/New_York in standard and daylight
  # time. The CLI accepts only the matching local hour.
  - type: cron
    name: nesp-questionnaire-reminders
    runtime: docker
    plan: starter
    region: virginia
    branch: master
    autoDeployTrigger: checksPass
    schedule: "0 13,14 * * *"
    dockerfilePath: ./docker/render/Dockerfile
    dockerContext: .
    dockerCommand: php scripts/nesp_questionnaire_reminders.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_TIMEZONE
        value: America/New_York
      - key: NESP_SERVICE_ROLE
        value: cron
      - key: APP_BASIC_AUTH
        value: 0
      - key: NESP_QUESTIONNAIRE_REMINDERS_ENABLED
        sync: false
      - key: NESP_QUESTIONNAIRE_REMINDER_SYSTEM_USER_ID
        sync: false
      - key: DB_NAME
        value: cats
      - key: DB_USER
        fromService:
          name: nesp-hiring-db
          type: pserv
          envVarKey: MARIADB_USER
      - key: DB_PASSWORD
        fromService:
          name: nesp-hiring-db
          type: pserv
          envVarKey: MARIADB_PASSWORD
      - key: DB_HOST
        fromService:
          name: nesp-hiring-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: nesp-hiring-db
          type: pserv
          property: port
      - key: OPENCATS_MAIL_ENABLED
        sync: false
      - key: OPENCATS_MAIL_MAILER
        sync: false
      - key: OPENCATS_MAIL_SMTP_HOST
        sync: false
      - key: OPENCATS_MAIL_SMTP_PORT
        sync: false
      - key: OPENCATS_MAIL_SMTP_AUTH
        sync: false
      - key: OPENCATS_MAIL_SMTP_USER
        sync: false
      - key: OPENCATS_MAIL_SMTP_PASS
        sync: false
      - key: OPENCATS_MAIL_SMTP_SECURE
        sync: false
      - key: OPENCATS_MAIL_FROM_ADDRESS
        sync: false
