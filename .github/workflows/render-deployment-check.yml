name: Render Deployment Check

on:
  pull_request:
    paths:
      - 'render.yaml'
      - 'docker/render/**'
      - 'docker/php/production.ini'
      - '.github/workflows/render-deployment-check.yml'
      - 'docs/nesp/job-ads/**'
      - 'docs/nesp/hiring-role-config.json'
      - 'docs/nesp/RENDER_DEPLOYMENT.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-render-blueprint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          python -m pip install --disable-pip-version-check pyyaml

      - name: Check shell scripts
        run: |
          sh -n docker/render/entrypoint.sh
          sh -n docker/render/backup.sh
          shellcheck -s sh docker/render/entrypoint.sh
          shellcheck -s sh docker/render/backup.sh

      - name: Validate structured hiring configuration
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path('docs/nesp/hiring-role-config.json').read_text())
          role_ids = {role['id'] for role in config.get('roles', [])}
          expected = {
              'freelance_contract_youth_sports_photographer',
              'on_site_picture_day_table_staff',
              'part_time_customer_service_representative',
              'photography_assistant_poser',
              'w2_seasonal_youth_sports_photographer',
          }
          if role_ids != expected:
              raise SystemExit(f'Unexpected role set: {sorted(role_ids)}')
          if config.get('ai_policy', {}).get('decision_authority') != 'human_only':
              raise SystemExit('Hiring decision authority must remain human-only.')
          for role in config['roles']:
              if not role.get('compensation', {}).get('approval_required'):
                  raise SystemExit(f"Compensation must remain approval-gated: {role['id']}")
          print('NESP hiring role configuration is valid and approval-gated.')
          PY

      - name: Validate Render Blueprint safety rules
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import yaml

          blueprint = yaml.safe_load(Path('render.yaml').read_text())
          services = {service['name']: service for service in blueprint.get('services', [])}
          errors = []

          database = services.get('nesp-hiring-db')
          web = services.get('nesp-hiring-web')

          if database is None:
              errors.append('Missing nesp-hiring-db service.')
          if web is None:
              errors.append('Missing nesp-hiring-web service.')

          if database:
              if database.get('type') != 'pserv':
                  errors.append('MariaDB must be a private service.')
              if database.get('runtime') != 'image':
                  errors.append('MariaDB must use a registered image runtime.')
              image_url = ((database.get('image') or {}).get('url') or '')
              if not image_url.startswith('docker.io/library/mariadb:'):
                  errors.append('MariaDB must use the official Docker Hub image.')
              if (database.get('disk') or {}).get('mountPath') != '/var/lib/mysql':
                  errors.append('MariaDB persistent disk must mount at /var/lib/mysql.')

              env = {item.get('key'): item for item in database.get('envVars', []) if item.get('key')}
              for secret in ('MARIADB_PASSWORD', 'MARIADB_ROOT_PASSWORD'):
                  if not env.get(secret, {}).get('generateValue'):
                      errors.append(f'{secret} must be generated by Render.')

          if web:
              if web.get('type') != 'web' or web.get('runtime') != 'docker':
                  errors.append('OpenCATS must be a Docker web service.')
              if web.get('dockerfilePath') != './docker/render/Dockerfile':
                  errors.append('Unexpected Render Dockerfile path.')
              if (web.get('disk') or {}).get('mountPath') != '/var/data':
                  errors.append('OpenCATS persistent disk must mount at /var/data.')
              if web.get('autoDeployTrigger') != 'checksPass':
                  errors.append('Auto deploy must wait for passing CI checks.')

              env = {item.get('key'): item for item in web.get('envVars', []) if item.get('key')}
              if env.get('INSTALL_ACCESS_PASSWORD', {}).get('sync') is not False:
                  errors.append('Installer access password must be entered in Render, not committed.')
              if str(env.get('OPENCATS_MAIL_ENABLED', {}).get('value')) != '0':
                  errors.append('Outbound OpenCATS mail must remain disabled for initial testing.')

              db_host = env.get('DB_HOST', {}).get('fromService', {})
              if db_host.get('name') != 'nesp-hiring-db' or db_host.get('property') != 'host':
                  errors.append('Web service must use the private MariaDB host reference.')

              db_password = env.get('DB_PASSWORD', {}).get('fromService', {})
              if db_password.get('envVarKey') != 'MARIADB_PASSWORD':
                  errors.append('Web service must receive the generated MariaDB password by reference.')

          if errors:
              raise SystemExit('\n'.join(f'ERROR: {error}' for error in errors))

          print('Render Blueprint passed NESP safety checks.')
          PY

  smoke-test-render-image:
    runs-on: ubuntu-latest
    needs: validate-render-blueprint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Render image
        run: docker build -f docker/render/Dockerfile -t nesp-hiring-render:test .

      - name: Start isolated MariaDB and OpenCATS containers
        run: |
          docker network create nesp-hiring-test
          docker volume create nesp-hiring-test-files

          docker run -d \
            --name nesp-hiring-test-db \
            --network nesp-hiring-test \
            -e MARIADB_DATABASE=cats \
            -e MARIADB_USER=opencats \
            -e MARIADB_PASSWORD=test-only-password \
            -e MARIADB_ROOT_PASSWORD=test-only-root-password \
            mariadb:10.11

          timeout 180s bash -c \
            'until docker exec nesp-hiring-test-db mariadb-admin ping -h localhost -u root -ptest-only-root-password --silent; do sleep 3; done'

          docker run -d \
            --name nesp-hiring-test-web \
            --network nesp-hiring-test \
            -p 127.0.0.1:18080:10000 \
            -v nesp-hiring-test-files:/var/data \
            -e PORT=10000 \
            -e DB_HOST=nesp-hiring-test-db \
            -e DB_NAME=cats \
            -e DB_USER=opencats \
            -e DB_PASSWORD=test-only-password \
            -e INSTALL_ACCESS_USER=nesp-admin \
            -e INSTALL_ACCESS_PASSWORD=test-only-install-password \
            -e OPENCATS_MAIL_ENABLED=0 \
            nesp-hiring-render:test

      - name: Verify health endpoint and password gate
        run: |
          timeout 180s bash -c \
            'until curl -fsS http://127.0.0.1:18080/render-health.txt | grep -q ok; do sleep 3; done'

          unauthenticated_status="$(curl -sS -o /tmp/root-unauthenticated.html -w '%{http_code}' http://127.0.0.1:18080/)"
          test "$unauthenticated_status" = "401"

          authenticated_status="$(curl -sS -u nesp-admin:test-only-install-password -o /tmp/root-authenticated.html -w '%{http_code}' http://127.0.0.1:18080/)"
          test "$authenticated_status" = "200"
          grep -qi 'OpenCATS' /tmp/root-authenticated.html

      - name: Verify persistent paths, safe config, and logical backup
        run: |
          docker exec nesp-hiring-test-web sh -c '
            test -L /var/www/html/config.php
            test -L /var/www/html/INSTALL_BLOCK
            test -L /var/www/html/attachments
            test -L /var/www/html/uploads
            test -L /var/www/html/temp
            grep -F "define('\''DATABASE_USER'\'', '\''opencats'\'');" /var/data/config.php
            grep -F "define('\''DATABASE_HOST'\'', '\''nesp-hiring-test-db'\'');" /var/data/config.php
            grep -F "define('\''MAIL_MAILER'\'', 0);" /var/data/config.php
            touch /var/data/state/persistence-marker
            RETENTION_DAYS=1 nesp-render-backup
            test "$(find /var/data/backups -name database.sql.gz -type f | wc -l)" -eq 1
            test "$(find /var/data/backups -name opencats-files.tar.gz -type f | wc -l)" -eq 1
            gzip -t "$(find /var/data/backups -name database.sql.gz -type f | head -n 1)"
          '

          docker rm -f nesp-hiring-test-web

          docker run -d \
            --name nesp-hiring-test-web \
            --network nesp-hiring-test \
            -p 127.0.0.1:18080:10000 \
            -v nesp-hiring-test-files:/var/data \
            -e PORT=10000 \
            -e DB_HOST=nesp-hiring-test-db \
            -e DB_NAME=cats \
            -e DB_USER=opencats \
            -e DB_PASSWORD=test-only-password \
            -e INSTALL_ACCESS_USER=nesp-admin \
            -e INSTALL_ACCESS_PASSWORD=test-only-install-password \
            -e OPENCATS_MAIL_ENABLED=0 \
            nesp-hiring-render:test

          timeout 120s bash -c \
            'until curl -fsS http://127.0.0.1:18080/render-health.txt | grep -q ok; do sleep 3; done'
          docker exec nesp-hiring-test-web test -f /var/data/state/persistence-marker
          docker exec nesp-hiring-test-web sh -c 'find /var/data/backups -name database.sql.gz -type f | grep -q .'

      - name: Container diagnostics
        if: failure()
        run: |
          docker ps -a
          docker logs nesp-hiring-test-db || true
          docker logs nesp-hiring-test-web || true

      - name: Clean up containers
        if: always()
        run: |
          docker rm -f nesp-hiring-test-web nesp-hiring-test-db 2>/dev/null || true
          docker network rm nesp-hiring-test 2>/dev/null || true
          docker volume rm nesp-hiring-test-files 2>/dev/null || true
